<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation Dashboard - Ollama Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="logger.js"></script>
    <script src="apiGateway.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>🦙 Conversation Dashboard</h1>
            <a href="/" class="back-link">← Back to Chat</a>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-value" id="totalConversations">0</div>
                <div class="stat-label">Total Conversations</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMessages">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="selectedCount">0</div>
                <div class="stat-label">Selected</div>
            </div>
        </div>

        <div class="dashboard-toolbar">
            <input type="text" id="searchInput" placeholder="🔍 Search conversations...">
            <button id="refreshBtn" class="toolbar-btn">🔄 Refresh</button>
            <div id="bulkActions" class="bulk-actions" style="display: none;">
                <button id="exportSelectedBtn" class="toolbar-btn">📤 Export Selected</button>
                <button id="deleteSelectedBtn" class="toolbar-btn danger">🗑️ Delete Selected</button>
                <button id="clearSelectionBtn" class="toolbar-btn">✕ Clear Selection</button>
            </div>
        </div>

        <div id="conversationsContainer" class="conversations-container">
            <div style="text-align: center; padding: 40px; color: #999;">
                📂 Loading conversations... Please wait
            </div>
        </div>
    </div>

    <div id="confirmDeleteModal" class="modal">
        <div class="modal-content">
            <h3>⚠️ Confirm Deletion</h3>
            <p>Are you sure you want to delete this conversation? This action cannot be undone.</p>
            <div class="modal-actions">
                <button onclick="closeConfirmDeleteModal()">Cancel</button>
                <button class="danger" onclick="executeDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="dashboard.js"></script>
</body>
</html>
